<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bookmark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (no rounded corners - OS will mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="180" fill="#ffffff" opacity="0.06"/>

  <!-- art kept inside ~80% safe zone (centered, scaled to 0.7) -->
  <g transform="translate(256 256) scale(0.7)">
    <!-- open book -->
    <g transform="translate(0 30)">
      <path d="M -180 -90 Q -90 -110 -8 -90 L -8 100 Q -90 80 -180 100 Z"
            fill="url(#pageL)" stroke="#94a3b8" stroke-width="2"/>
      <path d="M 180 -90 Q 90 -110 8 -90 L 8 100 Q 90 80 180 100 Z"
            fill="url(#pageR)" stroke="#94a3b8" stroke-width="2"/>
      <path d="M -8 -90 L -8 100 L 8 100 L 8 -90 Z" fill="#475569" opacity="0.25"/>
      <g stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.7">
        <line x1="-150" y1="-50" x2="-30" y2="-58"/>
        <line x1="-150" y1="-25" x2="-50" y2="-32"/>
        <line x1="-150" y1="0" x2="-40" y2="-7"/>
        <line x1="-150" y1="25" x2="-60" y2="18"/>
        <line x1="-150" y1="50" x2="-45" y2="43"/>
        <line x1="30" y1="-58" x2="150" y2="-50"/>
        <line x1="50" y1="-32" x2="150" y2="-25"/>
        <line x1="40" y1="-7" x2="150" y2="0"/>
        <line x1="60" y1="18" x2="150" y2="25"/>
        <line x1="45" y1="43" x2="150" y2="50"/>
      </g>
    </g>

    <!-- bookmark ribbon -->
    <path d="M 90 -180 L 150 -180 L 150 -30 L 120 -60 L 90 -30 Z"
          fill="url(#bookmark)" stroke="#0d9488" stroke-width="2"/>

    <!-- spark -->
    <g transform="translate(-160 -150)">
      <path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z"
            fill="#5eead4"/>
    </g>
  </g>
</svg>
